services:
  db:
    image: postgres:alpine
    volumes:
        -   postgres_data:/var/lib/postgresql/data
    env_file:
        -  .env
    ports:
        - "${POSTGRES_PORT}:5432"
    expose:
        - "${POSTGRES_PORT}"
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
        interval: 10s
        retries: 5
        timeout: 5s
      
volumes:
  postgres_data: